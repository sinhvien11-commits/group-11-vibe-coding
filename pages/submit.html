<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gửi Phản Hồi - Cà Phê S11</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-amber-50 min-h-screen">
  <script src="../shared/nav.js"></script>

  <main class="max-w-lg mx-auto mt-10 p-6 bg-white rounded-xl shadow">
    <h1 class="text-2xl font-bold text-amber-900 mb-6">Gửi Phản Hồi</h1>

    <form id="feedbackForm" class="space-y-5" novalidate>

      <!-- Name -->
      <div>
        <label for="name" class="block text-sm font-medium text-gray-700 mb-1">
          Tên <span class="text-gray-400">(tùy chọn)</span>
        </label>
        <input type="text" id="name" placeholder="Nhập tên của bạn"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-400">
      </div>

      <!-- Location -->
      <div>
        <label for="location" class="block text-sm font-medium text-gray-700 mb-1">
          Chi nhánh <span class="text-red-500">*</span>
        </label>
        <select id="location"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white">
          <option value="">-- Chọn chi nhánh --</option>
          <option value="District 1">District 1</option>
          <option value="District 3">District 3</option>
          <option value="Thao Dien">Thao Dien</option>
        </select>
      </div>

      <!-- Rating -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Đánh giá <span class="text-red-500">*</span>
        </label>
        <div id="ratingStars" class="flex gap-1"></div>
        <input type="hidden" id="rating">
      </div>

      <!-- Comment -->
      <div>
        <label for="comment" class="block text-sm font-medium text-gray-700 mb-1">
          Nhận xét <span class="text-red-500">*</span>
        </label>
        <textarea id="comment" rows="4"
                  placeholder="Chia sẻ trải nghiệm của bạn tại cửa hàng..."
                  class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-400 resize-none"></textarea>
      </div>

      <!-- Validation error -->
      <p id="errorMsg" class="text-red-600 text-sm hidden"></p>

      <!-- Submit -->
      <button type="submit"
              class="w-full bg-amber-700 hover:bg-amber-800 active:bg-amber-900 text-white font-semibold py-2.5 px-4 rounded-lg transition-colors">
        Gửi Phản Hồi
      </button>
    </form>

    <!-- Success -->
    <div id="successMsg"
         class="hidden mt-5 p-4 bg-green-100 border border-green-300 text-green-800 rounded-lg text-center font-medium">
      ✓ Cảm ơn phản hồi của bạn!
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="../shared/firebase.js"></script>

  <script>
    const STORAGE_KEY = 'feedbackEntries';
    const ratingInput = document.getElementById('rating');
    const starsContainer = document.getElementById('ratingStars');

    // Build star buttons
    for (let i = 1; i <= 5; i++) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.dataset.value = i;
      btn.textContent = '★';
      btn.className = 'text-4xl leading-none text-gray-300 hover:text-amber-400 transition-colors cursor-pointer';
      btn.addEventListener('click', () => setRating(i));
      starsContainer.appendChild(btn);
    }

    function setRating(value) {
      ratingInput.value = value > 0 ? value : '';
      starsContainer.querySelectorAll('button').forEach((btn, idx) => {
        btn.className = `text-4xl leading-none transition-colors cursor-pointer ${idx < value ? 'text-amber-400' : 'text-gray-300 hover:text-amber-400'}`;
      });
    }

    document.getElementById('feedbackForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const name     = document.getElementById('name').value.trim();
      const location = document.getElementById('location').value;
      const rating   = ratingInput.value;
      const comment  = document.getElementById('comment').value.trim();
      const errorMsg = document.getElementById('errorMsg');

      if (!location) {
        showError('Vui lòng chọn chi nhánh.');
        return;
      }
      if (!rating) {
        showError('Vui lòng chọn số sao đánh giá.');
        return;
      }
      if (!comment) {
        showError('Vui lòng nhập nhận xét.');
        return;
      }

      errorMsg.classList.add('hidden');

      const entry = {
        id: Date.now(),
        name: name || 'Ẩn danh',
        location,
        rating: parseInt(rating),
        comment,
        timestamp: new Date().toISOString()
      };

      const entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      entries.push(entry);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));

      if (window.firebaseDB) {
        window.firebaseDB.saveEntry(entry).catch(err =>
          console.warn('Firestore write failed:', err)
        );
      }

      // Reset
      this.reset();
      setRating(0);

      const msg = document.getElementById('successMsg');
      msg.classList.remove('hidden');
      setTimeout(() => msg.classList.add('hidden'), 3500);
    });

    function showError(text) {
      const el = document.getElementById('errorMsg');
      el.textContent = text;
      el.classList.remove('hidden');
    }
  </script>
</body>
</html>
